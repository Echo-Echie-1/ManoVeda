<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ManoVeda — Emotional History</title>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;600;800&display=swap" rel="stylesheet">

  <style>
   /* -----------------------------
   MAIN THEME + HISTORY MERGED
   Paste this into your main CSS file
   ----------------------------- */

/* Fonts: main site uses Nunito (fallbacks included) */
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;600;800&display=swap');

:root{
  --accent-1: #a855f7; /* purple */
  --accent-2: #00d2ff;
  --bg-dark: #050505;
  --panel-bg: rgba(255,255,255,0.03);
  --muted: #bdbdbd;
  --text: #eaeaea;
  --card: #0f1724;
}

/* Page basics (main site) */
html,body {
  margin: 0;
  padding: 0;
  font-family: 'Nunito', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  background: linear-gradient(135deg, #0b0b0f 0%, #0f1220 100%); /* dark hero base */
  color: var(--text);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* NAVBAR / LOGO (kept from main) */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 30px;
  background: rgba(34,34,34,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  position: sticky;
  top: 0;
  z-index: 80;
}
.logo { font-size: 1.6rem; font-weight: 800; display:inline-flex; gap:4px; align-items:center; }
.logo .mano { background: linear-gradient(90deg, #00f0da, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.logo .veda { background: linear-gradient(90deg, #00bfff, #1e90ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

/* Luxury frame (top/right/bottom/left animated strips) */
:root { --lux-color-1: rgba(255,215,80,1); --lux-color-2: rgba(255,200,120,0.8); --lux-speed: 8000ms; }
.luxury-frame { position: fixed; inset:0; pointer-events:none; z-index:60; }
.lux-seg{ position:absolute; background: linear-gradient(90deg,var(--lux-color-1),transparent 40%,var(--lux-color-2)); background-size:200% 100%; opacity:0.9; }
.lux-top{ top:2px; left:0; right:0; height:4px; animation:shimmerX var(--lux-speed) linear infinite; }
.lux-bottom{ left:0; right:0; bottom:2px; height:4px; animation:shimmerX var(--lux-speed) linear infinite; transform-origin:center; }
.lux-left{ top:0; left:2px; bottom:0; width:4px; animation:shimmerY var(--lux-speed) linear infinite; }
.lux-right{ top:0; right:2px; bottom:0; width:4px; animation:shimmerY var(--lux-speed) linear infinite; }
@keyframes shimmerX{ 0%{background-position:0% 0}100%{background-position:200% 0} }
@keyframes shimmerY{ 0%{background-position:0 0%}100%{background-position:0 200%} }

/* Mandala corners (decorative) */
.mandala-corner{ position: fixed; width:110px; height:110px; opacity:0.12; z-index:30; pointer-events:none; filter: drop-shadow(0 6px 18px rgba(0,0,0,0.45)); }
.mandala-top-left{ top:14px; left:14px; transform:scale(0.9); }
.mandala-top-right{ top:14px; right:14px; transform:rotate(90deg) scale(0.9); }
.mandala-bottom-left{ bottom:14px; left:14px; transform:rotate(-90deg) scale(0.9); }
.mandala-bottom-right{ bottom:14px; right:14px; transform:rotate(180deg) scale(0.9); }

/* HERO / article-section baseline from main theme */
.hero{ text-align:center; padding:48px 16px 6px 16px; }
.article-section{ padding:48px 20px; background-color: #09090b; color:var(--text); line-height:1.7; }
.article-container{ max-width:1100px; margin: 0 auto; }

/* ========== HISTORY-SPECIFIC (merged visual language) ========== */

/* Wrap the history area in an article-like panel so it matches main */
.history-panel {
  max-width: 1000px;
  margin: 28px auto;
  padding: 26px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border-radius: 16px;
  box-shadow: 0 10px 40px rgba(2,6,23,0.6);
  border: 1px solid rgba(255,255,255,0.03);
}

/* Heading */
.history-panel h1 {
  margin: 0 0 14px 0;
  font-size: 1.6rem;
  color: var(--text);
  text-align: center;
}

/* container + layout */
.history-container {
  display: grid;
  gap: 20px;
  padding: 6px;
}

/* each entry card */
.entry {
  background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.02));
  border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 8px 30px rgba(2,6,23,0.55);
  border-left: 6px solid var(--accent-1);
  transition: transform .18s ease, box-shadow .18s ease;
}
.entry:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(2,6,23,0.6); }

/* crisis entry looks urgent */
.entry.crisis {
  border-left-color: #ef4444;
  background: linear-gradient(180deg, rgba(255,240,240,0.02), rgba(255,230,230,0.01));
}

/* header row */
.entry-header {
  display:flex;
  justify-content: space-between;
  align-items:center;
  gap: 16px;
}

/* mood and date */
.mood {
  font-size: 1.1rem;
  font-weight: 800;
  color: var(--text);
}
.date {
  font-size: 0.85rem;
  color: var(--muted);
}

/* sections inside entry */
.section {
  margin-top: 10px;
  font-size: 0.95rem;
  color: #dfe7f7;
}
.label {
  font-weight:700;
  color: var(--accent-1);
}

/* answers list */
.answers { margin-top: 8px; padding-left: 18px; color: #cbd5ff; }
.answers li { margin-bottom: 6px; }

/* empty / placeholder message */
.empty {
  text-align:center;
  color: var(--muted);
  padding: 40px 0;
}

/* small responsive tweaks */
@media (max-width: 720px){
  .history-panel { margin: 16px; padding: 16px; border-radius: 12px; }
  .entry { padding: 14px; }
  .mood { font-size: 1rem; }
}

/* utility: subtle link style for resources */
.resource-link { color: var(--accent-2); text-decoration: underline; font-weight:600; }

/* ensure existing .feature-btn / features still work */
.feature-btn { background: var(--accent-1); color: #fff; border-radius: 24px; padding: 10px 20px; box-shadow: 0 8px 28px rgba(168,85,247,0.24); }

  </style>
</head>

<body>

  <!-- Luxury frame -->
  <div class="luxury-frame">
    <div class="lux-seg lux-top"></div>
    <div class="lux-seg lux-right"></div>
    <div class="lux-seg lux-bottom"></div>
    <div class="lux-seg lux-left"></div>
  </div>

  <main class="article-section">
    <div class="article-container">
      <div class="history-panel">
        <h1>🧠 Your Emotional History</h1>
        <div class="history-container" id="history"></div>
      </div>
    </div>
  </main>

  <script type="module" src="history.js"></script>

</body>
</html>
