<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ManoVeda — Chat</title>
  <link rel="icon" href="bingo.png" type="image/png">

  <!-- Theme loader (exactly like your new index) -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved === 'dark' || (!saved && prefersDark);
        document.documentElement.classList.toggle('dark', isDark);
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts (same as new index) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Markdown + Sanitizer (kept from your old chat) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap');

    :root {
      --primary-r: 168;
      --primary-g: 85;
      --primary-b: 247;
    }

    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #e6e6e9;
      background: radial-gradient(circle at 18% 6%, rgba(99,102,241,0.16), transparent 36%),
                  radial-gradient(circle at 82% 20%, rgba(16,185,129,0.12), transparent 36%),
                  #0a0a0f;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    .logo-font { font-family: 'Nunito', sans-serif; }

    /* Luxury frame (exactly like new index) */
    .luxury-frame {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
    }
    .lux-edge {
      position: absolute;
      background: linear-gradient(90deg, transparent, rgba(168,85,247,0.06), transparent);
    }
    .lux-edge.top-0 { top: 2px; left: 0; right: 0; height: 1px; }
    .lux-edge.bottom-0 { bottom: 2px; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(234,179,8,0.05), transparent); }

    /* Glass effect (same as index) */
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Chat layout */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding-top: 80px; /* space for fixed nav */
    }

    #chatBox {
      flex: 1;
      overflow-y: auto;
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.75rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(168, 85, 247, 0.4) transparent;
    }

    #chatBox::-webkit-scrollbar {
      width: 6px;
    }
    #chatBox::-webkit-scrollbar-thumb {
      background: rgba(168, 85, 247, 0.4);
      border-radius: 20px;
    }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: fadeIn 0.3s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .user-message {
      align-self: flex-end;
      align-items: flex-end;
    }

    .bot-message {
      align-self: flex-start;
      align-items: flex-start;
    }

    .message-content {
      padding: 14px 20px;
      border-radius: 22px;
      font-size: 1.05rem;
      line-height: 1.65;
      position: relative;
    }

    .user-message .message-content {
      background: linear-gradient(135deg, rgb(168 85 247), rgb(124 58 237));
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 10px 30px -10px rgba(168,85,247,0.4);
    }

    .bot-message .message-content {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-bottom-left-radius: 4px;
      box-shadow: 0 10px 30px -10px rgba(0,0,0,0.3);
    }

    .message time {
      font-size: 10px;
      opacity: 0.55;
      margin-top: 6px;
      padding-left: 4px;
    }

    /* Input area */
    .chat-input-area {
      padding: 1.25rem 1.5rem 2rem;
      background: linear-gradient(to top, #0a0a0f, transparent);
    }

    .input-wrapper {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9999px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      backdrop-filter: blur(16px);
    }

    /* Markdown styling (kept from your old chat + improved) */
    .bot-message p { margin: 0 0 0.85rem; }
    .bot-message ul, .bot-message ol { margin: 0.5rem 0 1rem 1.25rem; }
    .bot-message code {
      background: rgba(255,255,255,0.08);
      padding: 2px 7px;
      border-radius: 6px;
      font-family: ui-monospace, monospace;
      font-size: 0.92rem;
    }

    /* Typing indicator */
    .bot-message.typing {
      opacity: 0.9;
    }
    .typing-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      margin-left: 4px;
      border-radius: 50%;
      background: #fff;
      opacity: .25;
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2){ animation-delay: .15s }
    .typing-dots span:nth-child(3){ animation-delay: .30s }
    @keyframes blink { 0%{opacity:.2} 50%{opacity:1} 100%{opacity:.2} }

    /* Cursor glow (same as index) */
    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(168,85,247,0.22) 0%, transparent 65%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: blur(90px);
      z-index: 0;
      transition: transform 0.1s ease-out;
    }
  </style>
</head>
<body class="dark">

  <!-- Luxury frame -->
  <div class="luxury-frame pointer-events-none" aria-hidden="true">
    <div class="lux-edge top-0"></div>
    <div class="lux-edge bottom-0"></div>
  </div>

  <!-- Fixed Navbar (matches new index style) -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-white/10">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <a href="/" class="flex items-center text-sm font-medium text-zinc-400 hover:text-white transition-colors">
          ← Dashboard
        </a>
        <div class="logo-font flex items-center gap-1.5">
          <span class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-cyan-400 via-violet-500 to-amber-400 bg-clip-text text-transparent">Mano</span>
          <span class="text-3xl font-bold tracking-tighter text-white">veda</span>
          <span class="text-xs font-medium text-emerald-400 pl-2 tracking-widest">AI</span>
        </div>
      </div>

      <div class="flex items-center gap-6 text-sm">
        <div class="hidden md:flex items-center gap-2 text-emerald-400 text-xs font-medium">
          <div class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></div>
          Always listening
        </div>
        <!-- Theme toggle (copied from index) -->
        <button id="theme-toggle" onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-2xl glass hover:bg-white/10 transition-all active:scale-95" aria-label="Toggle theme">
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Chat Container -->
  <div class="chat-container">
    
    <!-- Chat Header -->
    <div class="px-8 py-5 border-b border-white/10 bg-black/30 backdrop-blur-lg flex items-center justify-between z-40">
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-3xl bg-gradient-to-br from-violet-500 to-cyan-400 flex items-center justify-center text-3xl shadow-inner">🪷</div>
        <div>
          <div class="font-semibold text-xl tracking-tight logo-font">ManoVeda</div>
          <div class="flex items-center gap-1.5 text-emerald-400 text-xs">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-400"></span>
            </span>
            here for you • private
          </div>
        </div>
      </div>
      <div onclick="window.location='/'" class="text-xs px-5 py-2 rounded-3xl glass text-zinc-400 hover:text-white cursor-pointer transition-colors flex items-center gap-2">
        <span>End session</span>
      </div>
    </div>

    <!-- Messages -->
    <div id="chatBox" class="chat-box" role="log" aria-live="polite"></div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-wrapper max-w-3xl mx-auto">
        <input 
          type="text" 
          id="userInput" 
          class="flex-1 bg-transparent px-7 py-4 text-lg outline-none placeholder-zinc-400" 
          placeholder="Type your thoughts here... 🪷" 
          autocomplete="off" 
        />
        <button 
          id="sendBtn"
          class="w-14 h-14 flex items-center justify-center bg-gradient-to-br from-violet-600 to-cyan-500 rounded-3xl text-3xl hover:scale-110 active:scale-95 transition-all shadow-xl shadow-violet-500/30"
        >
          →
        </button>
      </div>
      <p class="text-center text-[10px] text-zinc-500 mt-4 tracking-widest">Your words stay between you and ManoVeda</p>
    </div>
  </div>

  <!-- Cursor glow -->
  <div class="cursor-glow"></div>

  <!-- ALL YOUR ORIGINAL JAVASCRIPT — 100% UNCHANGED -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    (function () {
      /* ========================= CONFIG ========================= */
      const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4";
      const FUNCTION_URL = "https://vxknarwomlejxksmjinx.supabase.co/functions/v1/manoveda-ai";

      /* ========================= LOAD SUPABASE (UMD) ========================= */
      const supabase = window.supabase.createClient( SUPABASE_URL, SUPABASE_ANON_KEY );

      /* ========================= SESSION ID (CRITICAL) ========================= */
      let sessionId = localStorage.getItem("manoveda_chat_session");
      if (!sessionId) {
        sessionId = crypto.randomUUID();
        localStorage.setItem("manoveda_chat_session", sessionId);
      }

      /* ========================= DOM ========================= */
      const chatBox = document.getElementById("chatBox");
      const inputEl = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");

      /* ========================= UI HELPERS ========================= */
      function createMessageEl({ role, htmlContent, textContent }) {
        const wrapper = document.createElement("div");
        wrapper.className = "message " + (role === "user" ? "user-message" : "bot-message");
        const content = document.createElement("div");
        content.className = "message-content";
        if (role === "user") {
          content.textContent = textContent;
        } else {
          content.innerHTML = htmlContent;
        }
        wrapper.appendChild(content);
        const timeEl = document.createElement("time");
        timeEl.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", });
        wrapper.appendChild(timeEl);
        return wrapper;
      }

      function appendUserMessage(text) {
        chatBox.appendChild( createMessageEl({ role: "user", textContent: text }) );
        scrollToBottom();
      }

      function appendAIMessage(markdown) {
        const rawHtml = marked.parse(String(markdown));
        const safe = DOMPurify.sanitize(rawHtml, { ALLOWED_ATTR: ["href", "target", "rel"], });
        chatBox.appendChild( createMessageEl({ role: "bot", htmlContent: safe }) );
        scrollToBottom();
      }

      function scrollToBottom() {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: "smooth" });
      }

      function setSending(sending) {
        sendBtn.disabled = sending;
        sendBtn.style.opacity = sending ? 0.7 : 1;
      }

      /* ========================= SUPABASE INSERT (FIX) ========================= */
      async function storeMessage(role, message) {
        try {
          await supabase.from("chat_messages").insert({
            session_id: sessionId,
            role: role,
            message: message
          });
        } catch (e) {
          console.error("Supabase insert failed", e);
        }
      }

      /* ========================= SEND MESSAGE ========================= */
      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;
        appendUserMessage(text);
        inputEl.value = "";
        setSending(true);

        storeMessage("user", text);

        try {
          const res = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
            },
            body: JSON.stringify({ userMsg: text }),
          });
          let data;
          try { data = await res.json(); } catch { throw new Error("Invalid JSON from server"); }
          const reply = data?.reply || data?.message || "Sorry, I couldn't answer that.";
          appendAIMessage(reply);
          storeMessage("assistant", reply);
        } catch (err) {
          appendAIMessage(`⚠️ ${err.message}`);
        } finally {
          setSending(false);
        }
      }

      /* ========================= EVENTS ========================= */
      sendBtn.addEventListener("click", sendMessage);
      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      /* ========================= WELCOME (UI ONLY) ========================= */
      appendAIMessage( "Hello — I'm **ManoVeda**, here to listen and support you. Type anything whenever you're ready." );

    })();
  </script>

  <!-- Theme toggle + glow scripts (same as index) -->
  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
      const sun = document.getElementById('sun-icon');
      const moon = document.getElementById('moon-icon');
      if (sun && moon) {
        sun.classList.toggle('hidden', isDark);
        moon.classList.toggle('hidden', !isDark);
      }
    }

    // Cursor glow (smooth follow)
    const glow = document.querySelector('.cursor-glow');
    let mouseX = 0, mouseY = 0, posX = 0, posY = 0;
    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    function animateGlow() {
      posX += (mouseX - posX) * 0.12;
      posY += (mouseY - posY) * 0.12;
      glow.style.left = posX + "px";
      glow.style.top = posY + "px";
      requestAnimationFrame(animateGlow);
    }
    animateGlow();
  </script>
</body>
</html>
