<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manoveda • Sign In</title>
  <link rel="icon" href="bingo.png" type="image/png">
  <!-- Prevent flash: set dark class early -->
  <script>
    (function () {
      try {
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        const isDark = saved === 'dark' || (!saved && prefersDark);
        document.documentElement.classList.toggle('dark', isDark);
      } catch (e) { /* ignore */ }
    })();
  </script>
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Nunito:wght@400;600;700;800&display=swap');
    :root { --primary-r: 168; --primary-g: 85; --primary-b: 247; }
    html, body {
      height: 100vh;
      margin: 0;
      overflow: hidden; /* NO SCROLL EVER */
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #e6e6e9;
      background:
        radial-gradient(circle at 18% 6%, rgba(99,102,241,0.16), transparent 36%),
        radial-gradient(circle at 82% 20%, rgba(16,185,129,0.12), transparent 36%),
        #0a0a0f;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    /* ===== Cursor Glow ===== */
    .cursor-glow {
      position: fixed;
      width: 350px;
      height: 350px;
      background: radial-gradient(circle, rgba(168,85,247,0.25) 0%, transparent 60%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      filter: blur(80px);
      z-index: 0;
      transition: transform 0.08s ease-out;
    }
    .logo-font { font-family: 'Nunito', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    html.dark .glass { background: rgba(15,23,42,0.45); border-color: rgba(255,255,255,0.04); }
    .mandala { opacity: .12; pointer-events: none; }
    /* Input spacing fix + modern look */
    .input-field {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-field:focus {
      border-color: rgb(168 85 247);
      box-shadow: 0 0 0 3px rgba(168,85,247,0.2);
      transform: translateY(-1px);
    }
    @media (max-width: 768px) {
      .orb1, .orb2 { display: none; }
    }
  </style>
</head>
<body>
  <!-- luxury frame -->
  <div class="luxury-frame pointer-events-none fixed inset-0 z-50" aria-hidden="true">
    <div class="lux-edge top-0 left-0 right-0 h-px" style="position:absolute;top:2px;left:0;right:0;background:linear-gradient(90deg,transparent,rgba(168,85,247,0.06),transparent)"></div>
    <div class="lux-edge bottom-0 left-0 right-0 h-px" style="position:absolute;bottom:2px;left:0;right:0;background:linear-gradient(90deg,transparent,rgba(234,179,8,0.05),transparent)"></div>
  </div>

  <!-- mandala corners -->
  <svg class="mandala absolute top-6 left-6 w-24 h-24 text-white/8" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="50" cy="50" r="22" stroke="currentColor" stroke-width="0.9"/>
    <path d="M50 12 L54 28 L70 28 L57 40 L62 58 L50 48 L38 58 L43 40 L30 28 L46 28 Z" fill="currentColor"/>
  </svg>
  <svg class="mandala absolute top-6 right-6 w-24 h-24 text-white/8 rotate-90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="38" stroke="currentColor" stroke-width="1.4"/>
    <circle cx="50" cy="50" r="22" stroke="currentColor" stroke-width="0.9"/>
    <path d="M50 12 L54 28 L70 28 L57 40 L62 58 L50 48 L38 58 L43 40 L30 28 L46 28 Z" fill="currentColor"/>
  </svg>

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-40 glass border-b border-white/6">
    <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
      <div onclick="window.location.href='index.html'" class="logo-font flex items-center gap-1.5 cursor-pointer">
        <span class="text-3xl font-bold tracking-tighter bg-gradient-to-r from-cyan-400 via-violet-500 to-amber-400 bg-clip-text text-transparent">Mano</span>
        <span class="text-3xl font-bold tracking-tighter text-white">veda</span>
        <span class="text-xs font-medium text-emerald-400 pl-2">AI</span>
      </div>
      <div class="flex items-center gap-4">
        <button id="theme-toggle" onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-2xl glass hover:bg-white/6 transition-all active:scale-95">
          <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
          <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <a href="index.html" class="px-6 py-2.5 rounded-3xl glass text-sm font-medium hover:bg-white/6 transition-all flex items-center gap-2">
          ← Back to home
        </a>
      </div>
    </div>
  </nav>

  <!-- LOGIN SECTION - FULL VIEWPORT, PERFECT CENTER, NO SCROLL -->
  <section class="hero-bg h-screen flex items-center relative overflow-hidden">
    <!-- orbs -->
    <div class="orb orb1" style="background: rgb(168 85 247); width: 600px; height: 600px; top: -10%; left: -10%;"></div>
    <div class="orb orb2" style="background: rgb(34 211 238); width: 800px; height: 800px; bottom: -20%; right: -15%;"></div>

    <div class="max-w-screen-2xl mx-auto px-6 relative z-10 w-full">
      <div class="max-w-md mx-auto" data-aos="fade-up" data-aos-duration="900">
        <!-- Big centered logo + tagline -->
        <div class="text-center mb-10">
          <div class="logo-font flex items-center justify-center gap-1.5 mb-3">
            <span class="text-6xl font-bold tracking-tighter bg-gradient-to-r from-cyan-400 via-violet-500 to-amber-400 bg-clip-text text-transparent">Mano</span>
            <span class="text-6xl font-bold tracking-tighter text-white">veda</span>
          </div>
          <div class="text-emerald-400 text-sm font-medium tracking-[2px]">INNER PEACE THROUGH AI</div>
          <h1 class="text-4xl font-semibold text-white mt-6">Welcome back</h1>
          <p class="text-zinc-400 mt-2 text-lg">Continue your gentle journey</p>
        </div>

        <!-- Glass Card with FIXED SPACING -->
        <div class="glass rounded-3xl p-8 md:p-10 shadow-2xl">
          <div class="flex flex-col gap-4"> <!-- ← THIS FIXES MIXED SPACING -->
            <input type="text" id="full_name" placeholder="Full Name" class="input-field w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-zinc-400 focus:outline-none text-base" />
            <input type="tel" id="phone" placeholder="Phone Number" class="input-field w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-zinc-400 focus:outline-none text-base" />
            <input type="email" id="email" placeholder="Email" class="input-field w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-zinc-400 focus:outline-none text-base" />
            <input type="password" id="password" placeholder="Password" class="input-field w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-zinc-400 focus:outline-none text-base" />
          </div>

          <button onclick="signUp()" class="w-full mt-8 py-4 rounded-3xl bg-gradient-to-r from-violet-600 via-purple-600 to-cyan-500 hover:brightness-110 font-semibold text-lg transition-all active:scale-[0.985] shadow-2xl shadow-violet-500/40">
            Create account
          </button>
          
          <button onclick="login()" class="w-full mt-3 py-4 rounded-3xl glass border border-white/10 hover:border-white/30 font-semibold text-lg transition-all active:scale-[0.985]">
            Sign in
          </button>

          <button onclick="forgotPassword()" class="w-full mt-6 text-sm text-violet-400 hover:text-violet-300 transition-colors">
            Forgot password?
          </button>

          <div class="my-8 flex items-center gap-4">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-xs text-zinc-500 font-medium tracking-widest">OR</span>
            <div class="flex-1 h-px bg-white/10"></div>
          </div>

          <button onclick="googleLogin()" class="w-full flex items-center justify-center gap-3 py-4 rounded-3xl glass hover:bg-white/10 border border-white/10 transition-all">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="w-5 h-5" style="filter: brightness(0) invert(1);">
            <span class="font-medium">Continue with Google</span>
          </button>

          <div id="message" class="mt-6 text-center text-sm min-h-[1.25rem]"></div>
        </div>

        <div class="text-center mt-8 text-xs text-zinc-500">
          Protected by Supabase • Privacy-first
        </div>
      </div>
    </div>
  </section>

  <!-- scripts -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      try { localStorage.setItem('theme', isDark ? 'dark' : 'light'); } catch(e){}
      const sun = document.getElementById('sun-icon');
      const moon = document.getElementById('moon-icon');
      if (sun && moon) {
        sun.classList.toggle('hidden', isDark);
        moon.classList.toggle('hidden', !isDark);
      }
    }
    function loadTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      const isDark = saved === 'dark' || (!saved && prefersDark);
      document.documentElement.classList.toggle('dark', isDark);
      const sun = document.getElementById('sun-icon');
      const moon = document.getElementById('moon-icon');
      if (sun && moon) {
        sun.classList.toggle('hidden', isDark);
        moon.classList.toggle('hidden', !isDark);
      }
    }
    window.onload = function () {
      AOS.init({ once: true, duration: 900, easing: 'cubic-bezier(0.4,0,0.2,1)' });
      loadTheme();
      console.log('%c✨ Manoveda Login loaded — welcome back ✨', 'color:#a855f7; font-family:monospace');
    };
  </script>

  <!-- Cursor glow -->
  <script>
    const glow = document.createElement("div");
    glow.className = "cursor-glow";
    document.body.appendChild(glow);
    let mouseX = 0, mouseY = 0;
    let posX = 0, posY = 0;
    document.addEventListener("mousemove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });
    function animate() {
      posX += (mouseX - posX) * 0.1;
      posY += (mouseY - posY) * 0.1;
      glow.style.left = posX + "px";
      glow.style.top = posY + "px";
      requestAnimationFrame(animate);
    }
    animate();
  </script>

  <!-- YOUR ORIGINAL SUPABASE SCRIPT — UNCHANGED -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";
    const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const fullNameInput = document.getElementById("full_name");
    const phoneInput = document.getElementById("phone");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const messageBox = document.getElementById("message");

    function showMessage(text, type = "info") {
      messageBox.textContent = text;
      messageBox.className = `mt-6 text-center text-sm ${type === "error" ? "text-red-400" : type === "success" ? "text-emerald-400" : "text-zinc-400"}`;
    }

    window.signUp = async () => {
      const { error } = await supabase.auth.signUp({
        email: emailInput.value,
        password: passwordInput.value,
        options: {
          data: {
            full_name: fullNameInput.value,
            phone: phoneInput.value
          }
        }
      });
      if (error) return showMessage(error.message, "error");
      showMessage("Account created! Check your email to confirm.", "success");
    };

    window.login = async () => {
      const { error } = await supabase.auth.signInWithPassword({
        email: emailInput.value,
        password: passwordInput.value
      });
      if (error) return showMessage(error.message, "error");
      showMessage("Welcome back! Redirecting...", "success");
      setTimeout(() => window.location.href="index.html", 1200);
    };

    window.forgotPassword = () => {
      showMessage("Password reset coming soon ✨", "info");
    };

    window.googleLogin = async () => {
      await supabase.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin }
      });
    };
  </script>
</body>
</html>
