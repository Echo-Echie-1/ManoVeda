<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ManoVeda — Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  font-family: 'Nunito', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #0b0b0f 0%, #0f1220 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f1f1f1;
}

/* Luxury Border Frame */
.luxury-frame {
  position: fixed;
  inset: 0;
  pointer-events: none;
}

.lux-seg {
  position: absolute;
  background: linear-gradient(90deg,#00f0da,#a855f7,#00f0da);
  background-size: 200% 200%;
  animation: borderMove 6s linear infinite;
}

.lux-top, .lux-bottom {
  height: 2px;
  width: 100%;
}

.lux-left, .lux-right {
  width: 2px;
  height: 100%;
}

.lux-top { top:0; left:0; }
.lux-bottom { bottom:0; left:0; }
.lux-left { left:0; top:0; }
.lux-right { right:0; top:0; }

@keyframes borderMove {
  0% { background-position: 0% 50%; }
  100% { background-position: 100% 50%; }
}

/* Auth Box */
.auth-box {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);
  padding: 36px;
  width: 100%;
  max-width: 420px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.05);
}

h1 {
  text-align: center;
  margin-bottom: 8px;
  font-weight: 800;
  background: linear-gradient(90deg, #00f0da, #00bfff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  text-align: center;
  color: #bdbdbd;
  margin-bottom: 24px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
}

input:focus {
  outline: none;
  border-color: #a855f7;
  box-shadow: 0 0 0 2px rgba(168,85,247,0.3);
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #a855f7;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  transition: 0.25s ease;
  box-shadow: 0 8px 28px rgba(168,85,247,0.35);
}

button:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 45px rgba(168,85,247,0.5);
}

button.secondary {
  background: rgba(168,85,247,0.15);
  color: #a855f7;
  box-shadow: none;
}

button.link {
  background: none;
  color: #00d2ff;
  box-shadow: none;
}

/* Google Button */
.google-btn-dark {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  background: linear-gradient(135deg,#111,#1f1f1f);
  border: 1px solid #333;
}

.google-btn-dark img {
  width: 18px;
  filter: brightness(0) invert(1);
}

/* Messages */
.msg {
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
}

.error { color: #ef4444; }
.success { color: #22c55e; }

</style>
</head>

<body>

<div class="luxury-frame">
  <div class="lux-seg lux-top"></div>
  <div class="lux-seg lux-right"></div>
  <div class="lux-seg lux-bottom"></div>
  <div class="lux-seg lux-left"></div>
</div>

<div class="auth-box">
  <h1>ManoVeda</h1>
  <p>Login or create your account</p>

  <input type="text" id="full_name" placeholder="Full Name" />
  <input type="tel" id="phone" placeholder="Phone Number" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button onclick="signUp()">Sign Up</button>
  <button class="secondary" onclick="login()">Login</button>
  <button class="link" onclick="forgotPassword()">Forgot password?</button>

  <button class="google-btn-dark" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Continue with Google
  </button>

  <div id="message" class="msg"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fullNameInput = document.getElementById("full_name");
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const messageBox = document.getElementById("message");

function showMessage(text, type = "info") {
  messageBox.textContent = text;
  messageBox.className = `msg ${type}`;
}

window.signUp = async () => {
  const { error } = await supabase.auth.signUp({
    email: emailInput.value,
    password: passwordInput.value,
    options: {
      data: {
        full_name: fullNameInput.value,
        phone: phoneInput.value
      }
    }
  });

  if (error) return showMessage(error.message, "error");
  showMessage("Account created! Check email.", "success");
};

window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: emailInput.value,
    password: passwordInput.value
  });

  if (error) return showMessage(error.message, "error");

  showMessage("Login successful!", "success");
  setTimeout(() => window.location.href="index.html", 1000);
};

window.forgotPassword = () => {
  showMessage("Password reset disabled.", "error");
};

window.googleLogin = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin }
  });
};
</script>

</body>
</html>
