<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ManoVeda — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
  box-sizing: border-box;
  font-family: 'Nunito', sans-serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #0b0b0f 0%, #0f1220 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #f1f1f1;
}

/* Auth Card */
.auth-box {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  padding: 36px;
  width: 100%;
  max-width: 420px;
  border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.05);
}

/* Heading */
h1 {
  text-align: center;
  margin-bottom: 8px;
  font-weight: 800;
  background: linear-gradient(90deg, #00f0da, #00bfff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

p {
  text-align: center;
  color: #bdbdbd;
  margin-bottom: 24px;
}

/* Inputs */
input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 15px;
  transition: 0.2s ease;
}

input:focus {
  outline: none;
  border-color: #a855f7;
  box-shadow: 0 0 0 2px rgba(168,85,247,0.3);
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #a855f7;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.25s ease;
  box-shadow: 0 8px 28px rgba(168,85,247,0.35);
}

button:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 50px rgba(168,85,247,0.5);
}

button.secondary {
  background: rgba(168,85,247,0.15);
  color: #a855f7;
  box-shadow: none;
}

button.link {
  background: none;
  color: #00d2ff;
  font-weight: 600;
  box-shadow: none;
}

/* Messages */
.msg {
  margin-top: 10px;
  text-align: center;
  font-size: 14px;
}

.error { color: #ef4444; }
.success { color: #22c55e; }

  </style>
</head>

<body>
  <div class="luxury-frame">
  <div class="lux-seg lux-top"></div>
  <div class="lux-seg lux-right"></div>
  <div class="lux-seg lux-bottom"></div>
  <div class="lux-seg lux-left"></div>
</div>


  <div class="auth-box">
    <h1>ManoVeda </h1>
    <p>Login or create your account</p>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="signUp()">Sign Up</button>
    <button class="secondary" onclick="login()">Login</button>
    <button class="link" onclick="forgotPassword()">Forgot password?</button>

    <div id="message" class="msg"></div>
  </div>

  <!-- Supabase -->
  <script type="module">
  import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

  /* 🔧 SUPABASE CONFIG */
  const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
  const SUPABASE_ANON_KEY =
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4";

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* 🔹 DOM ELEMENTS */
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const messageBox = document.getElementById("message");

  function showMessage(text, type = "info") {
    messageBox.textContent = text;
    messageBox.className = `msg ${type}`;
  }

  /* =========================
     ✅ SIGN UP (NO EMAIL FLOW)
     ========================= */
  window.signUp = async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      showMessage("⚠️ Email and password required", "error");
      return;
    }

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      showMessage("❌ " + error.message, "error");
      return;
    }

    showMessage("✅ Account created! You can now log in.", "success");
  };

  /* =========================
     ✅ LOGIN
     ========================= */
  window.login = async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    if (!email || !password) {
      showMessage("⚠️ Email and password required", "error");
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      showMessage("❌ " + error.message, "error");
      return;
    }

    showMessage("🎉 Login successful! Redirecting...", "success");

    setTimeout(() => {
      window.location.href = "index.html"; // change if needed
    }, 1000);
  };

  /* =========================
     🚫 PASSWORD RESET (DISABLED)
     ========================= */
  window.forgotPassword = () => {
    showMessage("🔒 Password reset is disabled for now.", "error");
  };
</script>


</body>
</html>
