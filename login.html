<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ManoVeda — Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* ------------------------
   ManoVeda Sign-in — Styles
   Paste this in your <style> replacing old styles
   ------------------------ */

:root{
  --card-bg: rgba(255,255,255,0.035);
  --card-border: rgba(255,255,255,0.06);
  --glass-blur: 14px;
  --accent: #2f8a3a;            /* green accent for CTA (tweak as needed) */
  --accent-600: #2f8a3a;
  --accent-700: #1f6b2b;
  --muted: #bdbdbd;
  --input-bg: rgba(255,255,255,0.04);
}

/* reset same font & base */
* { box-sizing: border-box; font-family: 'Nunito', system-ui, sans-serif; }
html,body { height: 100%; margin:0; }

/* center page */
body {
  display:flex;
  align-items:center;
  justify-content:center;
  padding: 40px;
  background:
    radial-gradient(circle at 18% 6%, rgba(99,102,241,0.06), transparent 36%),
    radial-gradient(circle at 82% 20%, rgba(16,185,129,0.03), transparent 36%),
    #0a0a0f;
  color: #eef0f3;
}

/* card container — becomes two-column grid */
.auth-box {
  width: min(1100px, 94vw);
  height: auto;
  display: grid;
  grid-template-columns: 1fr 1fr; /* left = form, right = image pseudo */
  gap: 0;
  border-radius: 20px;
  overflow: visible;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border: 1px solid var(--card-border);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  position: relative;
}

/* right side image via pseudo element — covers right column fully */
.auth-box::after{
  content:"";
  grid-column: 2 / 3;
  grid-row: 1 / -1;
  background-image: url('https://images.unsplash.com/photo-1501004318641-b39e6451bec6?q=80&w=1400&auto=format&fit=crop&ixlib=rb-4.0.3&s=1d0c9e8e7c1a7b2edb5b6b8c7b7d0aef'); /* leaf hero placeholder */
  background-size: cover;
  background-position: center center;
  border-top-right-radius: 20px;
  border-bottom-right-radius: 20px;
  border-left: 1px solid rgba(255,255,255,0.03);
  box-shadow: inset 0 0 90px rgba(0,0,0,0.25);
  position: relative;
  z-index: 1;
  min-height: 360px;
  /* subtle diagonal clipped shape on the left edge to match the reference */
  clip-path: polygon(12% 0, 100% 0, 100% 100%, 12% 100%, 0 60%);
}

/* overlay subtle white rounded panel effect on the left column */
.auth-box .left-filler {
  /* this helper keeps a visual left panel zone — we use :first-child elements instead if left-filler isn't present */
}

/* left column content styles (your existing children will flow here) */
.auth-box > * {
  z-index: 2; /* ensures form sits above the image pseudo */
}

/* limit left content width and add padding so elements are left-aligned like the design */
.auth-box > h1,
.auth-box > p,
.auth-box > input,
.auth-box > button,
.auth-box > .msg,
.auth-box > .google-btn,
.auth-box > .google-btn-dark {
  padding-left: 48px;
  padding-right: 28px;
}

/* center left column vertically */
.auth-box {
  align-items: center;
}

/* style the left side content as a vertical column */
.auth-box > * {
  width: 52%;          /* restrict form width so it sits left and leaves gap to image */
  max-width: 520px;
  justify-self: start;
}

/* vertical spacing for typical elements */
.auth-box h1 {
  margin: 8px 0 6px 0;
  font-size: 28px;
  line-height: 1.05;
  font-weight: 800;
  background: linear-gradient(90deg,#00f0da,#a855f7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.auth-box p {
  margin: 0 0 18px 0;
  color: var(--muted);
  font-size: 14px;
}

/* compact inputs with elegant style */
.auth-box input {
  display: block;
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.06);
  background: var(--input-bg);
  color: #fff;
  font-size: 14px;
  outline: none;
  transition: box-shadow .18s, border-color .18s, transform .12s;
  box-shadow: 0 6px 18px rgba(0,0,0,0.45) inset;
}

.auth-box input::placeholder { color: rgba(255,255,255,0.4); }

/* focus */
.auth-box input:focus {
  border-color: rgba(79,70,229,0.9);
  box-shadow: 0 8px 30px rgba(79,70,229,0.06);
  transform: translateY(-1px);
}

/* CTA primary (green) */
.auth-box button {
  appearance: none;
  cursor: pointer;
  border-radius: 10px;
  padding: 12px 18px;
  font-weight: 700;
  letter-spacing: .3px;
  font-size: 14px;
  box-shadow: 0 10px 30px rgba(31,78,42,0.12);
  transition: transform .12s ease, box-shadow .12s ease;
}

/* primary sign-up style (first button) — we detect it by normal DOM order; override generic purple */
.auth-box button:first-of-type {
  background: linear-gradient(180deg, var(--accent-600), var(--accent-700));
  color: #fff;
  border: none;
}

/* secondary and link */
.auth-box button.secondary {
  background: rgba(255,255,255,0.03);
  color: #cfcfd1;
  border: 1px solid rgba(255,255,255,0.04);
  box-shadow: none;
}

.auth-box button.link {
  background: transparent;
  color: #9ad6c9;
  font-weight: 600;
  box-shadow: none;
  padding: 6px 0;
}

/* hover */
.auth-box button:hover { transform: translateY(-3px); box-shadow: 0 18px 50px rgba(0,0,0,0.55); }
.auth-box button:first-of-type:hover { filter: brightness(1.03); }

/* social row (Google / Apple) - we style as pill buttons */
.social-row { display:flex; gap:12px; margin-top:6px; align-items:center; }
.social-btn {
  flex:1;
  display:flex;
  gap:10px;
  align-items:center;
  justify-content:center;
  padding:10px 12px;
  border-radius:10px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.04);
  color: #fff;
  font-weight:600;
  font-size:13px;
}

/* google icon contained */
.social-btn img { width:18px; height:18px; object-fit:contain; filter: none; }

/* message area */
.msg { margin-top: 10px; font-size: 13px; color: var(--muted); }

/* small checkbox row */
.checkbox-row { display:flex; gap:8px; align-items:center; font-size:13px; color:var(--muted); margin:8px 0; }

/* card inner left top spacing for smaller screens */
@media (max-width: 880px) {
  .auth-box {
    grid-template-columns: 1fr;
    padding: 28px;
    border-radius: 16px;
  }
  .auth-box::after { display:none; }                     /* hide right image on small screens */
  .auth-box > * { width: 100%; padding-left: 0; padding-right: 0; justify-self: stretch; }
  .auth-box input { font-size:15px; padding:14px 12px; border-radius:12px; }
  .auth-box h1 { font-size: 26px; text-align:center; }
  .auth-box p { text-align:center; margin-bottom:18px; }
  .social-row { flex-direction: column; }
}

/* subtle thin inner card to match example */
.auth-box::before {
  content: "";
  position: absolute;
  inset: 8px;
  border-radius: 16px;
  pointer-events: none;
  background: linear-gradient(180deg, rgba(255,255,255,0.007), transparent 40%);
  z-index: 0;
}

/* small niceties */
.auth-box input[type="tel"], .auth-box input[type="email"], .auth-box input[type="password"] { -webkit-appearance: none; }
</style>
</head>

<body>

<div class="luxury-frame">
  <div class="lux-seg lux-top"></div>
  <div class="lux-seg lux-right"></div>
  <div class="lux-seg lux-bottom"></div>
  <div class="lux-seg lux-left"></div>
</div>

<div class="auth-box">
  <h1>ManoVeda</h1>
  <p>Login or create your account</p>

  <input type="text" id="full_name" placeholder="Full Name" />
  <input type="tel" id="phone" placeholder="Phone Number" />
  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />

  <button onclick="signUp()">Sign Up</button>
  <button class="secondary" onclick="login()">Login</button>
  <button class="link" onclick="forgotPassword()">Forgot password?</button>

  <button class="google-btn-dark" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Continue with Google
  </button>

  <div id="message" class="msg"></div>
</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4";

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const fullNameInput = document.getElementById("full_name");
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");
const passwordInput = document.getElementById("password");
const messageBox = document.getElementById("message");

function showMessage(text, type = "info") {
  messageBox.textContent = text;
  messageBox.className = `msg ${type}`;
}

window.signUp = async () => {
  const { error } = await supabase.auth.signUp({
    email: emailInput.value,
    password: passwordInput.value,
    options: {
      data: {
        full_name: fullNameInput.value,
        phone: phoneInput.value
      }
    }
  });

  if (error) return showMessage(error.message, "error");
  showMessage("Account created! Check email.", "success");
};

window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: emailInput.value,
    password: passwordInput.value
  });

  if (error) return showMessage(error.message, "error");

  showMessage("Login successful!", "success");
  setTimeout(() => window.location.href="index.html", 1000);
};

window.forgotPassword = () => {
  showMessage("Password reset disabled.", "error");
};

window.googleLogin = async () => {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.origin }
  });
};
</script>

</body>
</html>
