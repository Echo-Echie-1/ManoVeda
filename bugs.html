<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Report a Bug • ManoVeda</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: 'Poppins', sans-serif; }
.glass {
  background: rgba(255,255,255,0.07);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="bg-gradient-to-br from-black via-purple-900 to-indigo-900 text-white min-h-screen flex items-center justify-center p-6">

<div class="glass w-full max-w-2xl rounded-2xl p-8 shadow-2xl">

<div class="flex flex-col items-center mb-6">
  <h2 class="text-3xl font-bold">Report a Bug</h2>
  <p class="text-gray-300 text-sm mt-1">Help us improve ManoVeda</p>
</div>

<form id="bugForm" class="space-y-4">

<input id="name" type="text" placeholder="Your Name"
class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-purple-500">

<input id="phone" type="text" placeholder="Phone Number"
class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-purple-500">

<input id="email" type="email" placeholder="Email"
class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-purple-500">

<textarea id="message" placeholder="Describe the issue..."
class="w-full p-3 rounded-lg bg-white/10 outline-none focus:ring-2 focus:ring-purple-500 h-32"></textarea>

<input id="file" type="file" accept="image/*,video/*,audio/*"
class="w-full text-sm text-gray-300">

<button type="submit"
class="w-full bg-purple-600 hover:bg-purple-700 p-3 rounded-lg font-semibold transition">
Submit Report
</button>

</form>

<p id="status" class="text-center mt-4 text-sm"></p>

</div>

<script>
(function () {

const SUPABASE_URL = "https://vxknarwomlejxksmjinx.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4a25hcndvbWxlanhrc21qaW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAyNTAzMjcsImV4cCI6MjA4NTgyNjMyN30.EG9iRbnR98roL18qEL6zmJLKbbROc0mSPmNh1MZnBZ4"; // keep yours here

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

// Session ID
let sessionId = localStorage.getItem("manoveda_bug_session");
if (!sessionId) {
  sessionId = crypto.randomUUID();
  localStorage.setItem("manoveda_bug_session", sessionId);
}

const form = document.getElementById("bugForm");
const statusEl = document.getElementById("status");

// Autofill email if logged in
async function autoFill() {
  const { data } = await supabase.auth.getUser();
  if (data?.user?.email) {
    document.getElementById("email").value = data.user.email;
  }
}
autoFill();

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusEl.innerText = "Submitting...";

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const email = document.getElementById("email").value.trim();
  const message = document.getElementById("message").value.trim();
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!message) {
    statusEl.innerText = "Message is required.";
    return;
  }

  let filePath = null;
  let fileType = null;

  // Upload file if exists
  if (file) {
    const uniquePath = `bugs/${sessionId}-${Date.now()}-${file.name}`;

    const { error: uploadError } = await supabase.storage
      .from("bug_uploads") // IMPORTANT: underscore
      .upload(uniquePath, file);

    if (uploadError) {
      console.error("Upload error:", uploadError);
      statusEl.innerText = "File upload failed.";
      return;
    }

    filePath = uniquePath;
    fileType = file.type;
  }

  const { data } = await supabase.auth.getUser();

  const { error } = await supabase
    .from("bug_reports")
    .insert({
      session_id: sessionId,
      user_id: data?.user?.id || null,
      name,
      phone,
      email,
      message,
      file_url: filePath,
      file_type: fileType,
      user_agent: navigator.userAgent,
      page_url: window.location.href
    });

  if (error) {
    console.error("Insert error:", error);
    statusEl.innerText = "Error submitting bug.";
    return;
  }

  statusEl.innerText = "✅ Bug report submitted successfully.";
  form.reset();
});

})();
</script>

</body>
</html>
